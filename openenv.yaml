id: APIExplorer-v0
name: API Explorer — Undocumented API Navigator
version: "0.1.0"
description: >
  An LLM agent must explore an undocumented REST API, infer its structure,
  and complete real-world tasks (fetch records, update state, paginate results)
  using the minimum number of API calls. Tests reasoning, not optimization.
authors:
  - name: Hrithik
    github: "https://github.com/hrithiknl17"
license: mit
action: APIAction
observation: APIObservation
entry_point: api_explorer_env.openenv_env:APIExplorerOpenEnv
scenarios:
  - easy
  - medium
  - hard
tasks:
  - id: count_merchants
    description: "How many merchants are registered in total?"
    difficulty: easy
  - id: count_failed_transactions
    description: "How many transactions have status 'failed'?"
    difficulty: medium
  - id: resolve_oldest_open_dispute
    description: "Find the first open dispute and resolve it. Return the dispute ID you resolved."
    difficulty: hard
tags:
  - api
  - tool-use
  - reasoning
  - openenv
  - llm-native
